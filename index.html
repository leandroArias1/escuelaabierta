<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escuela Abierta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <h2>Datos del Alumno</h2>
        <form id="loginForm">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required>
            
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" required>
            
            <label for="curso">Curso:</label>
            <select id="curso" name="curso" required>
                <option value="">Selecciona tu curso</option>
                <option value="1">1° Año Secundaria</option>
                <option value="2">2° Año Secundaria</option>
                <option value="3">3° Año Secundaria</option>
                <option value="4">4° Año Secundaria</option>
                <option value="5">5° Año Secundaria</option>
                <option value="1">1° Año Primaria</option>
                <option value="2">2° Año Primaria</option>
                <option value="3">3° Año Primaria</option>
                <option value="4">4° Año Primaria</option>
                <option value="5">5° Año Primaria</option>
                <option value="6">6° Año Primaria</option>
                <option value="7">7° Año Primaria</option>
            </select>
            
            <label for="division">División:</label>
            <select id="division" name="division" required>
                <option value="">Selecciona tu división</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

            <button type="submit">Login</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
